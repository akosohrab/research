<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Research Editor v5.0</title>
    <style>
        :root { --primary: #2c3e50; --accent: #e67e22; --bg: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg); padding: 20px; }
        .nav { background: var(--primary); color: white; padding: 15px; display: flex; justify-content: space-between; border-radius: 8px; }
        .card { background: white; padding: 20px; border-radius: 8px; margin-top: 20px; border: 1px solid #ddd; }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 4px; border: 1px solid #ccc; }
        textarea { height: 150px; font-family: inherit; }
        .hint { font-size: 0.75rem; color: #666; margin-bottom: 10px; }
        .btn-save { background: var(--accent); color: white; width: 100%; padding: 15px; border: none; font-size: 1.1rem; cursor: pointer; border-radius: 5px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="nav">
    <b>RESEARCH EDITOR v5.0</b>
    <div>
        <input type="password" id="gh-token" placeholder="GitHub Token" style="width:180px; padding:5px; margin:0;">
        <button onclick="fetchData()">Load Data</button>
    </div>
</div>

<div id="editor-ui" style="display:none; max-width:850px; margin:auto;">
    <div class="card">
        <h3>Sidebar / Profile</h3>
        <label>Photo URL</label><input id="s-photo" onchange="data.sidebar.photo=this.value">
        <label>Bio Summary</label><textarea id="s-bio" onchange="data.sidebar.bio=this.value"></textarea>
    </div>

    <div style="text-align:right; margin-top:20px;">
        <button onclick="addWork()" style="padding:10px 20px; background:var(--primary); color:white; border:none; border-radius:4px; cursor:pointer;">+ Add New Post</button>
    </div>

    <div id="works-list"></div>
    <button class="btn-save" onclick="saveData()">PUBLISH UPDATES</button>
</div>

<script>
    const GITHUB = { owner: "akosohrab", repo: "research", path: "data.json" };
    let data = {}, fileSha = "";

    async function fetchData() {
        const token = document.getElementById('gh-token').value;
        const res = await fetch(`https://api.github.com/repos/${GITHUB.owner}/${GITHUB.repo}/contents/${GITHUB.path}`, {
            headers: { 'Authorization': `token ${token}` }
        });
        const d = await res.json();
        fileSha = d.sha;
        data = JSON.parse(decodeURIComponent(escape(atob(d.content))));
        document.getElementById('s-photo').value = data.sidebar.photo;
        document.getElementById('s-bio').value = data.sidebar.bio;
        document.getElementById('editor-ui').style.display = 'block';
        renderWorks();
    }

    function renderWorks() {
        document.getElementById('works-list').innerHTML = data.works.map((w, i) => `
            <div class="card">
                <button style="float:right; color:red;" onclick="data.works.splice(${i},1); renderWorks();">Delete</button>
                <label>Language</label>
                <select onchange="data.works[${i}].lang=this.value; renderWorks();">
                    <option value="en" ${w.lang==='en'?'selected':''}>English (LTR)</option>
                    <option value="fa" ${w.lang==='fa'?'selected':''}>Persian (RTL)</option>
                    <option value="ku" ${w.lang==='ku'?'selected':''}>Kurdish (RTL)</option>
                    <option value="jp" ${w.lang==='jp'?'selected':''}>Japanese (LTR)</option>
                </select>
                <label>Title (Automatic Align)</label><input value="${w.title}" onchange="data.works[${i}].title=this.value">
                <label>Abstract / Content</label>
                <div class="hint">Tip: Use **text** for <b>Bold</b></div>
                <textarea onchange="data.works[${i}].abstract=this.value">${w.abstract}</textarea>
                <label>Link (Full Paper URL)</label><input value="${w.link}" onchange="data.works[${i}].link=this.value">
            </div>
        `).join('');
    }

    function addWork() {
        data.works.unshift({ lang: "en", title: "New Entry", abstract: "", date: "2026", type: "Article", source: "Journal Name", link: "" });
        renderWorks();
    }

    async function saveData() {
        const token = document.getElementById('gh-token').value;
        const res = await fetch(`https://api.github.com/repos/${GITHUB.owner}/${GITHUB.repo}/contents/${GITHUB.path}`, {
            method: 'PUT',
            headers: { 'Authorization': `token ${token}` },
            body: JSON.stringify({
                message: "Update Content v5.0",
                content: btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2)))),
                sha: fileSha
            })
        });
        if(res.ok) alert("Published Successfully!");
    }
</script>
</body>
</html>
