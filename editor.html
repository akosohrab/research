<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Research Editor v5.1</title>
    <style>
        :root { --primary: #2c3e50; --accent: #e67e22; --bg: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg); padding: 20px; }
        .nav { background: var(--primary); color: white; padding: 15px; display: flex; justify-content: space-between; border-radius: 8px; position: sticky; top: 0; z-index: 100; }
        .card { background: white; padding: 25px; border-radius: 8px; margin-top: 20px; border: 1px solid #ddd; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        label { font-weight: bold; color: #555; display: block; margin-top: 10px; font-size: 0.9rem; }
        input, textarea, select { width: 100%; padding: 12px; margin: 5px 0 15px; border-radius: 4px; border: 1px solid #ccc; box-sizing: border-box; font-size: 14px; }
        textarea { height: 150px; line-height: 1.6; }
        .btn { padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-save { background: var(--accent); color: white; width: 100%; font-size: 1.1rem; margin-top: 20px; }
        .hint { font-size: 0.75rem; color: #888; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="nav">
    <div style="font-weight:bold;">RESEARCH DATA EDITOR v5.1</div>
    <div>
        <input type="password" id="gh-token" placeholder="GitHub Token" style="width:200px; margin:0; padding:8px; border-radius:4px; border:none;">
        <button class="btn" style="background:white; color:var(--primary); padding:8px 15px;" onclick="fetchData()">Load Data</button>
    </div>
</div>

<div id="editor-ui" style="display:none; max-width: 900px; margin: auto;">
    <div class="card">
        <h3 style="margin-top:0;">Sidebar / Profile Info</h3>
        <label>Photo URL</label><input id="s-photo" onchange="data.sidebar.photo=this.value">
        <label>Display Name</label><input id="s-name" onchange="data.sidebar.name=this.value">
        <label>Title</label><input id="s-title" onchange="data.sidebar.title=this.value">
        <label>Bio Summary</label><textarea id="s-bio" onchange="data.sidebar.bio=this.value"></textarea>
    </div>
    
    <div style="text-align:right; margin-top:30px;">
        <button class="btn" style="background:var(--primary); color:white;" onclick="addWork()">+ Add New Publication / Abstract</button>
    </div>
    
    <div id="works-list"></div>
    <button class="btn btn-save" onclick="saveData()">PUBLISH UPDATES TO GITHUB</button>
</div>

<script>
    const GITHUB = { owner: "akosohrab", repo: "research", path: "data.json" };
    let data = {}, fileSha = "";

    async function fetchData() {
        const token = document.getElementById('gh-token').value;
        if(!token) return alert("Please enter your GitHub Token");
        
        try {
            const res = await fetch(`https://api.github.com/repos/${GITHUB.owner}/${GITHUB.repo}/contents/${GITHUB.path}`, {
                headers: { 'Authorization': `token ${token}` }
            });
            const d = await res.json();
            fileSha = d.sha;
            data = JSON.parse(decodeURIComponent(escape(atob(d.content))));
            
            document.getElementById('s-photo').value = data.sidebar.photo || '';
            document.getElementById('s-name').value = data.sidebar.name || '';
            document.getElementById('s-title').value = data.sidebar.title || '';
            document.getElementById('s-bio').value = data.sidebar.bio || '';
            document.getElementById('editor-ui').style.display = 'block';
            renderWorks();
        } catch (e) { alert("Error loading data. Check token and markers."); }
    }

    function renderWorks() {
        const list = document.getElementById('works-list');
        list.innerHTML = data.works.map((w, i) => `
            <div class="card">
                <button style="float:right; color:red; border:none; background:none; cursor:pointer; font-weight:bold;" onclick="if(confirm('Delete?')){data.works.splice(${i},1); renderWorks();}">Delete [X]</button>
                
                <label>Language</label>
                <select onchange="data.works[${i}].lang=this.value; renderWorks();">
                    <option value="en" ${w.lang==='en'?'selected':''}>English</option>
                    <option value="jp" ${w.lang==='jp'?'selected':''}>Japanese</option>
                    <option value="fa" ${w.lang==='fa'?'selected':''}>Persian (RTL)</option>
                    <option value="ku" ${w.lang==='ku'?'selected':''}>Kurdish (RTL)</option>
                </select>

                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                    <div><label>Date</label><input value="${w.date || ''}" onchange="data.works[${i}].date=this.value"></div>
                    <div><label>Type (e.g. Article)</label><input value="${w.type || ''}" onchange="data.works[${i}].type=this.value"></div>
                </div>

                <label>Title</label>
                <input value="${w.title || ''}" onchange="data.works[${i}].title=this.value">

                <label>Abstract / Key Findings</label>
                <div class="hint">Use **text** for Bold, *text* for Italic.</div>
                <textarea onchange="data.works[${i}].abstract=this.value">${w.abstract || ''}</textarea>

                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                    <div><label>Journal Name / Source</label>
                         <input value="${w.source || ''}" onchange="data.works[${i}].source=this.value"></div>
                    <div><label>Full Record Link (URL)</label>
                         <input value="${w.link || ''}" onchange="data.works[${i}].link=this.value"></div>
                </div>
            </div>
        `).join('');
    }

    function addWork() {
        if(!data.works) data.works = [];
        data.works.unshift({ lang: "en", title: "", abstract: "", date: "2026", type: "Article", source: "", link: "" });
        renderWorks();
    }

    async function saveData() {
        const token = document.getElementById('gh-token').value;
        const res = await fetch(`https://api.github.com/repos/${GITHUB.owner}/${GITHUB.repo}/contents/${GITHUB.path}`, {
            method: 'PUT',
            headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
                message: "Update Research Content v5.1",
                content: btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2)))),
                sha: fileSha
            })
        });
        if(res.ok) alert("Data.json Updated Successfully!");
    }
</script>
</body>
</html>
