<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Research Data Editor v3.0</title>
    <style>
        :root { --primary: #2c3e50; --accent: #e67e22; --bg: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg); padding: 20px; }
        .nav { background: var(--primary); color: white; padding: 15px; display: flex; justify-content: space-between; border-radius: 8px; position: sticky; top: 0; z-index: 100; }
        .card { background: white; padding: 20px; border-radius: 8px; margin-top: 20px; border: 1px solid #ddd; }
        input, textarea, select { width: 100%; padding: 10px; margin: 5px 0 15px; border-radius: 4px; border: 1px solid #ccc; box-sizing: border-box; }
        textarea { height: 100px; }
        .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-save { background: var(--accent); color: white; width: 100%; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="nav">
    <div style="font-weight:bold;">DATA EDITOR v3.0</div>
    <div>
        <input type="password" id="gh-token" placeholder="GitHub Token" style="width:200px; margin:0; padding:5px;">
        <button onclick="fetchData()">Load JSON</button>
    </div>
</div>

<div id="editor-ui" style="display:none; max-width: 800px; margin: auto;">
    <div class="card">
        <h3>Sidebar Info</h3>
        <label>Photo URL</label><input id="s-photo" onchange="data.sidebar.photo=this.value">
        <label>Bio</label><textarea id="s-bio" onchange="data.sidebar.bio=this.value"></textarea>
    </div>
    
    <div style="text-align:right; margin-top:20px;">
        <button class="btn" style="background:var(--primary); color:white;" onclick="addWork()">+ Add Post</button>
    </div>
    
    <div id="works-list"></div>
    <button class="btn btn-save" onclick="saveData()">SAVE TO DATA.JSON</button>
</div>

<script>
    const GITHUB = { owner: "akosohrab", repo: "research", path: "data.json" };
    let data = {}, fileSha = "";

    async function fetchData() {
        const token = document.getElementById('gh-token').value;
        const res = await fetch(`https://api.github.com/repos/${GITHUB.owner}/${GITHUB.repo}/contents/${GITHUB.path}`, {
            headers: { 'Authorization': `token ${token}` }
        });
        const d = await res.json();
        fileSha = d.sha;
        data = JSON.parse(decodeURIComponent(escape(atob(d.content))));
        
        document.getElementById('s-photo').value = data.sidebar.photo;
        document.getElementById('s-bio').value = data.sidebar.bio;
        document.getElementById('editor-ui').style.display = 'block';
        renderWorks();
    }

    function renderWorks() {
        const list = document.getElementById('works-list');
        list.innerHTML = data.works.map((w, i) => `
            <div class="card">
                <button style="float:right; color:red;" onclick="data.works.splice(${i},1); renderWorks();">Delete</button>
                <label>Language</label>
                <select onchange="data.works[${i}].lang=this.value; renderWorks();">
                    <option value="en" ${w.lang==='en'?'selected':''}>English</option>
                    <option value="fa" ${w.lang==='fa'?'selected':''}>Persian</option>
                    <option value="jp" ${w.lang==='jp'?'selected':''}>Japanese</option>
                </select>
                <label>Title</label><input value="${w.title}" onchange="data.works[${i}].title=this.value">
                <label>Abstract</label><textarea onchange="data.works[${i}].abstract=this.value">${w.abstract}</textarea>
            </div>
        `).join('');
    }

    function addWork() {
        data.works.unshift({ lang: "en", title: "New Title", abstract: "", date: "2026", type: "Article", source: "", link: "" });
        renderWorks();
    }

    async function saveData() {
        const token = document.getElementById('gh-token').value;
        const res = await fetch(`https://api.github.com/repos/${GITHUB.owner}/${GITHUB.repo}/contents/${GITHUB.path}`, {
            method: 'PUT',
            headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
                message: "Update Research Data",
                content: btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2)))),
                sha: fileSha
            })
        });
        if(res.ok) alert("Data.json Updated!");
    }
</script>
</body>
</html>
